<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <!-- CSP：禁脚本内联以外的远程加载；webview 自己的内容不受此限。 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>v0id 浏览器</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --bar: #12121a;
        --line: #23232f;
        --fg: #d7d7e0;
        --dim: #6a6a7a;
        --accent: #7c5cff;
        --accent-dim: #463a7a;
        --ok: #46d29a;
        --warn: #e0b020;
        --err: #ff5c7c;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Cascadia Code", monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      /* ---- 地址栏 ---- */
      #bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--bar);
        border-bottom: 1px solid var(--line);
        flex: 0 0 auto;
      }
      #logo {
        color: var(--accent);
        font-weight: bold;
        letter-spacing: 1px;
        padding: 0 6px;
        user-select: none;
      }
      #addr {
        flex: 1;
        background: #0d0d14;
        border: 1px solid var(--line);
        color: var(--fg);
        font-family: var(--mono);
        font-size: 14px;
        padding: 8px 12px;
        outline: none;
      }
      #addr:focus { border-color: var(--accent-dim); }
      #addr::placeholder { color: var(--dim); }
      #go {
        background: var(--accent);
        color: #fff;
        border: none;
        font-family: var(--mono);
        font-size: 14px;
        padding: 8px 18px;
        cursor: pointer;
      }
      #go:disabled { background: var(--accent-dim); color: var(--dim); cursor: not-allowed; }
      #go:not(:disabled):hover { background: #8a6cff; }
      /* ---- 状态行 ---- */
      #status {
        flex: 0 0 auto;
        padding: 5px 12px;
        font-size: 12px;
        color: var(--dim);
        background: #0d0d14;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 14px;
        white-space: nowrap;
        overflow: hidden;
      }
      #dot {
        width: 8px; height: 8px; border-radius: 0; /* 方点，像素风 */
        background: var(--warn);
        flex: 0 0 auto;
      }
      #dot.ready { background: var(--ok); }
      #dot.err { background: var(--err); }
      #phase { color: var(--fg); }
      #chain { color: var(--dim); }
      /* ---- webview 区 ---- */
      #stage { flex: 1 1 auto; position: relative; background: #05050a; }
      webview { width: 100%; height: 100%; border: 0; }
      /* 空态 / 错误覆盖层 */
      #overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; padding: 24px; gap: 10px;
        color: var(--dim);
        pointer-events: none;
      }
      #overlay.hidden { display: none; }
      #overlay h1 { color: var(--accent); font-size: 18px; margin: 0; letter-spacing: 2px; }
      #overlay p { margin: 2px 0; font-size: 13px; max-width: 520px; line-height: 1.5; }
      #overlay.error h1 { color: var(--err); }
      /* ---- 日志折叠区（排错用）---- */
      #log {
        flex: 0 0 auto;
        max-height: 120px;
        overflow-y: auto;
        font-size: 11px;
        color: var(--dim);
        background: #08080d;
        border-top: 1px solid var(--line);
        padding: 4px 12px;
        display: none;
        white-space: pre-wrap;
        line-height: 1.4;
      }
      #log.show { display: block; }
      #logToggle {
        background: none; border: none; color: var(--dim); cursor: pointer;
        font-family: var(--mono); font-size: 11px; text-decoration: underline; padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <span id="logo">.v0id</span>
      <input id="addr" type="text" placeholder="xxxxx.v0id" spellcheck="false" autocomplete="off" />
      <button id="go" disabled>前往</button>
    </div>

    <div id="status">
      <span id="dot"></span>
      <span id="phase">守护进程启动中…</span>
      <span id="chain"></span>
      <button id="logToggle">日志</button>
    </div>

    <div id="stage">
      <webview id="view" src="about:blank" partition="persist:v0id"></webview>
      <div id="overlay">
        <h1>.v0id</h1>
        <p>在上方输入一个 <b>.v0id</b> 隐藏服务地址，按回车或点“前往”。</p>
        <p>所有请求经本机守护进程的 SOCKS5 → 洋葱网络 → rendezvous 抵达隐藏服务，双方互不知 IP。</p>
        <p style="color:var(--dim)">需要守护进程已就绪、链上 ≥3 个中继、且目标服务已发布描述符。</p>
      </div>
    </div>

    <pre id="log"></pre>

    <script src="renderer.js"></script>
  </body>
</html>
